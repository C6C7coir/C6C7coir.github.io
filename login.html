<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src https://cdn.jsdelivr.net; img-src 'self' data:;">
    <title>Login | C6C7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3e9f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-section img {
            max-width: 160px;
            height: auto;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
            border-radius: 50%;
            object-fit: cover;
        }

        .tagline {
            color: #4ade80;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: #1b5e4a;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f0f2f5;
            border-radius: 14px;
            font-size: 1rem;
            background-color: #f9fafb;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ade80;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.15);
        }

        .form-group input:hover {
            border-color: #4ade80;
            background-color: #ffffff;
            transform: translateY(-1px);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #6b7280;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
            accent-color: #4ade80;
        }

        .forgot-password {
            color: #1b5e4a;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .forgot-password:hover {
            color: #4ade80;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1b5e4a 0%, #2d8a6e 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(27, 94, 74, 0.25);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: #6b7280;
            font-size: 0.95rem;
        }

        .signup-link a {
            color: #4ade80;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        #message-container {
            margin-bottom: 20px;
            border-radius: 12px;
            text-align: center;
            min-height: 24px;
        }

        .msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-error {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fee2e2;
        }

        .msg-success {
            background-color: #f0fdf4;
            color: #22c55e;
            border: 1px solid #dcfce7;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #1b5e4a;
        }

        .site-footer {
            margin-top: 32px;
            text-align: center;
            color: #9ca3af;
            font-size: 0.78rem;
            max-width: 420px;
            line-height: 1.6;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 25px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <img src="images/c6c7.jpg" alt="C6C7 Logo">
            <p class="tagline">C6C7</p>
        </div>

        <div id="message-container"></div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="login-id">Username or Email *</label>
                <input type="text" id="login-id" placeholder="Enter username or email" required autocomplete="username" maxlength="100">
            </div>

            <div class="form-group">
                <label for="login-pass">Password *</label>
                <div class="password-wrapper">
                    <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password" maxlength="128">
                    <button type="button" class="toggle-password" id="toggle-pass" aria-label="Toggle password visibility">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me"> Remember me
                </label>
                <a href="#" class="forgot-password" id="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" id="login-btn">Log In</button>
        </form>

        <div class="signup-link">
            <p>New here? <a href="signup.html">Create an account</a></p>
        </div>
    </div>

    <div class="site-footer">
        &copy; 2026 C6C7. For educational purposes only, and no copyright infringement is intended.
    </div>

    <script src="app.js"></script>
    <script>
        // Redirect to storefront if already logged in
        CocoStore.redirectIfLoggedIn('storefront.html');

        /* ======================
           RATE LIMITING
           ====================== */
        const RATE_KEY = 'coco_login_attempts';
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_MS = 60 * 1000; // 60 seconds

        function getRateData() {
            return JSON.parse(localStorage.getItem(RATE_KEY) || '{"count":0,"lockedUntil":0}');
        }

        function isLockedOut() {
            const data = getRateData();
            if (data.lockedUntil && Date.now() < data.lockedUntil) return true;
            if (data.lockedUntil && Date.now() >= data.lockedUntil) {
                localStorage.removeItem(RATE_KEY); // Reset after lockout expires
            }
            return false;
        }

        function recordFailedAttempt() {
            const data = getRateData();
            data.count = (data.count || 0) + 1;
            if (data.count >= MAX_ATTEMPTS) {
                data.lockedUntil = Date.now() + LOCKOUT_MS;
            }
            localStorage.setItem(RATE_KEY, JSON.stringify(data));
        }

        function clearAttempts() {
            localStorage.removeItem(RATE_KEY);
        }

        /* ======================
           UI SETUP
           ====================== */
        const form = document.getElementById('login-form');
        const loginIdInput = document.getElementById('login-id');
        const loginPassInput = document.getElementById('login-pass');
        const loginBtn = document.getElementById('login-btn');
        const messageContainer = document.getElementById('message-container');
        const togglePassBtn = document.getElementById('toggle-pass');
        const togglePassIcon = togglePassBtn.querySelector('i');
        const container = document.querySelector('.login-container');

        // Pre-fill email from signup redirect (e.g., login.html?email=user@example.com)
        const params = new URLSearchParams(window.location.search);
        const emailParam = params.get('email');
        if (emailParam) {
            loginIdInput.value = decodeURIComponent(emailParam).slice(0, 100);
            loginPassInput.focus();
        }

        // Load remembered identifier
        const remembered = localStorage.getItem('ghc_remembered_id');
        if (remembered && !emailParam) {
            loginIdInput.value = remembered;
            document.getElementById('remember-me').checked = true;
            loginPassInput.focus();
        }

        // Toggle password visibility
        togglePassBtn.addEventListener('click', function () {
            const isPassword = loginPassInput.type === 'password';
            loginPassInput.type = isPassword ? 'text' : 'password';
            togglePassIcon.classList.toggle('bi-eye');
            togglePassIcon.classList.toggle('bi-eye-slash');
        });

        // Forgot password placeholder
        document.getElementById('forgot-link').addEventListener('click', function (e) {
            e.preventDefault();
            showMessage('Password recovery is not available in this demo. Please contact support.', 'error');
        });

        /* ======================
           HELPERS
           ====================== */
        function showMessage(text, type) {
            // Use textContent assignment to avoid XSS
            const div = document.createElement('div');
            div.className = 'msg msg-' + type;
            div.textContent = text;
            messageContainer.innerHTML = '';
            messageContainer.appendChild(div);
            if (type === 'success') {
                setTimeout(() => { messageContainer.innerHTML = ''; }, 3000);
            }
        }

        function shakeContainer() {
            container.style.animation = 'none';
            container.offsetHeight; // trigger reflow
            container.style.animation = 'shake 0.4s ease';
        }

        /* ======================
           AUTHENTICATION
           ====================== */
        function authenticateUser(identifier, password) {
            const users = JSON.parse(localStorage.getItem('coco_users') || '[]');
            const id = identifier.toLowerCase();
            const user = users.find(u =>
                u.username.toLowerCase() === id ||
                u.email.toLowerCase() === id
            );
            if (!user) return { ok: false, message: 'Account not found. Please sign up first.' };
            if (user.password !== password) return { ok: false, message: 'Incorrect password. Please try again.' };
            const { password: _pw, ...safeUser } = user;
            return { ok: true, user: safeUser };
        }

        /* ======================
           FORM SUBMISSION
           ====================== */
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            if (isLockedOut()) {
                const data = getRateData();
                const secsLeft = Math.ceil((data.lockedUntil - Date.now()) / 1000);
                showMessage(`Too many failed attempts. Please wait ${secsLeft} seconds.`, 'error');
                shakeContainer();
                return;
            }

            const identifier = loginIdInput.value.trim().slice(0, 100);
            const password = loginPassInput.value.slice(0, 128);

            if (!identifier || !password) {
                showMessage('Please enter both username/email and password.', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            setTimeout(function () {
                const result = authenticateUser(identifier, password);

                if (result.ok) {
                    clearAttempts();
                    localStorage.setItem('coco_session', JSON.stringify(result.user));

                    if (document.getElementById('remember-me').checked) {
                        localStorage.setItem('ghc_remembered_id', identifier);
                    } else {
                        localStorage.removeItem('ghc_remembered_id');
                    }

                    showMessage('Success! Redirecting to shop...', 'success');
                    setTimeout(function () {
                        window.location.href = 'storefront.html';
                    }, 1000);
                } else {
                    recordFailedAttempt();
                    const data = getRateData();
                    const attemptsLeft = MAX_ATTEMPTS - data.count;
                    const msg = attemptsLeft > 0
                        ? result.message + ' (' + attemptsLeft + ' attempt' + (attemptsLeft !== 1 ? 's' : '') + ' left)'
                        : 'Account locked for 60 seconds due to too many failed attempts.';
                    showMessage(msg, 'error');
                    shakeContainer();
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Log In';
                }
            }, 600);
        });
    </script>
</body>
</html>
