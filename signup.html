<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | Green Husk Collective</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Roboto,sans-serif;
}

body{
background:linear-gradient(135deg,#f5f7fa,#c3e9f5);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.signup-container{
background:#fff;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
padding:40px;
width:100%;
max-width:650px;
}

.logo-section{
text-align:center;
margin-bottom:25px;
}

.logo-section img{
max-width:90px;
border-radius:50%;
margin-bottom:8px;
}

.tagline{
color:#4ade80;
font-size:.8rem;
font-weight:700;
text-transform:uppercase;
}

.form-row{
display:flex;
gap:12px;
}

@media(max-width:576px){
.form-row{
flex-direction:column;
}
}

.form-group{
flex:1;
margin-bottom:15px;
}

.form-group label{
font-weight:600;
font-size:.85rem;
color:#1b5e4a;
}

.form-group input,
.form-group select{
width:100%;
padding:12px;
border:2px solid #eee;
border-radius:12px;
background:#f9fafb;
transition:.2s;
}

.form-group input:hover,
.form-group select:hover{
border-color:#4ade80;
background:#fff;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
border-color:#1b5e4a;
box-shadow:0 0 0 4px rgba(27,94,74,.1);
}

.signup-btn{
width:100%;
padding:16px;
margin-top:10px;
background:linear-gradient(135deg,#1b5e4a,#2d8a6e);
color:#fff;
border:none;
border-radius:14px;
font-size:1.1rem;
cursor:pointer;
}

.msg{
padding:10px;
border-radius:8px;
text-align:center;
font-size:.85rem;
margin-bottom:10px;
}

.msg-error{
background:#fee;
color:red;
}

.msg-success{
background:#efe;
color:green;
}

/* strength */

.strength-container{
max-height:0;
overflow:hidden;
opacity:0;
transition:.3s;
}

.strength-container.visible{
max-height:60px;
opacity:.8;
}

.strength-meter{
height:6px;
background:#eee;
border-radius:3px;
}

.strength-bar{
height:100%;
width:0%;
transition:.3s;
}

</style>
</head>

<body>

<div class="signup-container">

<div class="logo-section">
<img src="c6c7.jpg">
<p class="tagline">Green Husk Collective</p>
</div>

<div id="message-container"></div>

<form id="signup-form">

<div class="form-row">

<div class="form-group">
<label>First Name *</label>
<input id="first-name" required>
</div>

<div class="form-group">
<label>Middle Name</label>
<input id="middle-name">
</div>

<div class="form-group">
<label>Last Name *</label>
<input id="last-name" required>
</div>

</div>


<div class="form-group">
<label>Mobile *</label>
<input id="mobile" required>
</div>


<div class="form-group">
<label>Region *</label>
<select id="region" required>
<option>Loading...</option>
</select>
</div>


<div class="form-row">

<div class="form-group">
<label>City *</label>
<select id="city" disabled required>
<option>Select region first</option>
</select>
</div>

<div class="form-group">
<label>Barangay *</label>
<select id="barangay" disabled required>
<option>Select city first</option>
</select>
</div>

</div>


<div class="form-group">
<label>Email *</label>
<input id="email" required>
</div>


<div class="form-group">
<label>Username *</label>
<input id="username" required>
</div>


<div class="form-row">

<div class="form-group">

<label>Password *</label>
<input type="password" id="password" required>

<div class="strength-container">

<div class="strength-meter">
<div id="strength-bar" class="strength-bar"></div>
</div>

<span id="strength-text"></span>

</div>

</div>


<div class="form-group">
<label>Confirm *</label>
<input type="password" id="confirm-password" required>
</div>

</div>


<button class="signup-btn">
Create Account
</button>

</form>

</div>



<script>


/* ======================
PSGC REGION API
====================== */

const regionSelect=document.getElementById("region")
const citySelect=document.getElementById("city")
const barangaySelect=document.getElementById("barangay")


async function safeFetch(url){

const r=await fetch(url)

if(!r.ok)throw "error"

return r.json()

}


function setLoading(el,text){

el.innerHTML=`<option>${text}</option>`

el.disabled=true

}


function setOptions(el,data,label){

el.innerHTML=`<option value="">${label}</option>`

data.forEach(x=>{

let o=document.createElement("option")

o.value=x.code

o.textContent=x.name

el.appendChild(o)

})

el.disabled=false

}



/* LOAD REGION */

(async()=>{

setLoading(regionSelect,"Loading...")

let regions=await safeFetch(
"https://psgc.gitlab.io/api/regions/"
)

regions.sort((a,b)=>
a.name.localeCompare(b.name)
)

setOptions(regionSelect,regions,"Select Region")

})()



/* REGION → CITY */

regionSelect.addEventListener("change",async function(){

let code=this.value

setLoading(citySelect,"Loading...")
setLoading(barangaySelect,"Select city first")

if(!code)return

let cities=await safeFetch(
`https://psgc.gitlab.io/api/regions/${code}/cities-municipalities/`
)

cities.sort((a,b)=>
a.name.localeCompare(b.name)
)

setOptions(
citySelect,
cities,
"Select City"
)

})



/* CITY → BRGY */

citySelect.addEventListener("change",async function(){

let code=this.value

setLoading(barangaySelect,"Loading...")

if(!code)return

let b=await safeFetch(
`https://psgc.gitlab.io/api/cities-municipalities/${code}/barangays/`
)

b.sort((a,b)=>
a.name.localeCompare(b.name)
)

setOptions(
barangaySelect,
b,
"Select Barangay"
)

})



/* ======================
PASSWORD STRENGTH
====================== */

const password=document.getElementById("password")

const bar=document.getElementById("strength-bar")

const text=document.getElementById("strength-text")

const container=document.querySelector(".strength-container")


password.addEventListener("input",function(){

let v=this.value

if(v.length>0)
container.classList.add("visible")
else
container.classList.remove("visible")

let s=0

if(v.length>=8)s++
if(/[A-Z]/.test(v))s++
if(/[0-9]/.test(v))s++
if(/[^A-Za-z0-9]/.test(v))s++

const colors=["red","orange","gold","green"]
const labels=["Weak","Fair","Good","Strong"]

bar.style.width=(s*25)+"%"
bar.style.backgroundColor=colors[s-1]

text.textContent=labels[s-1]||""

})



/* ======================
SUBMIT
====================== */

document.getElementById("signup-form")
.addEventListener("submit",function(e){

e.preventDefault()

let pass=password.value
let confirm=document.getElementById("confirm-password").value

if(pass!==confirm){
alert("Password not match")
return
}

alert("Registered!")

})


</script>

</body>
</html>
